# ============================================================================
# Open Posting — Docker Compose (Local Development)
# ============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://openposting:openposting@postgres:5432/openposting
      - REDIS_URL=redis://redis:6379
      - MEDIA_STORAGE_PATH=/data/media
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - X_CLIENT_ID=${X_CLIENT_ID}
      - X_CLIENT_SECRET=${X_CLIENT_SECRET}
      - X_BEARER_TOKEN=${X_BEARER_TOKEN}
      - X_GETXAPI_KEY=${X_GETXAPI_KEY}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
      - PUBLIC_URL=http://localhost:3000
      - LOG_LEVEL=debug
    volumes:
      - mediadata:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp
    environment:
      - API_URL=http://api:3000
      - API_KEY=${MCP_API_KEY}
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openposting
      POSTGRES_USER: openposting
      POSTGRES_PASSWORD: openposting
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openposting"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  mediadata:
